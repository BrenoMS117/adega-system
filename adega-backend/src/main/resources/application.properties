server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/adega}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET:minha-chave-secreta-super-longa-minimo-32-caracteres}
jwt.expiration=28800000

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}

# Email (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# App URL for reset link
app.url=${APP_URL:http://localhost}
app.reset-token-expiration-hours=1

spring.jpa.open-in-view=false
server.tomcat.max-http-form-post-size=2MB
server.tomcat.max-swallow-size=2MB
spring.mvc.pathmatch.use-suffix-pattern=false
